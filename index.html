<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Somar — PAW Patrol</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#2d1b4e;font-family:'Baloo 2','Comic Sans MS','Chalkboard SE',system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100dvh;overflow:hidden;user-select:none}
  .game{width:100vw;height:100dvh;max-width:600px;background:linear-gradient(180deg,#6c5ce7 0%,#a55eea 45%,#fd79a8 100%);display:flex;flex-direction:column;position:relative;overflow:hidden}
  .header{text-align:center;padding:10px 14px 4px;flex-shrink:0;display:flex;justify-content:space-between;color:rgba(255,255,255,0.85);font-size:clamp(14px,3.5vw,17px);font-weight:700}
  .header .score{color:#ffe259;font-weight:800}

  .arena{flex:1.5;display:flex;flex-direction:column;align-items:center;padding:4px 8px;position:relative;overflow-y:auto;overflow-x:hidden}
  .poke-rows{display:flex;flex-direction:column;align-items:center;gap:clamp(8px,2vw,12px);width:100%;margin:auto}
  .poke-card{display:flex;align-items:center;gap:clamp(8px,2.5vw,14px);background:rgba(255,255,255,0.18);border-radius:20px;padding:clamp(8px,2vw,12px) clamp(10px,3vw,16px);width:min(94%,440px);box-shadow:0 4px 0 rgba(0,0,0,0.1)}
  .badge{min-width:clamp(44px,12vw,52px);height:clamp(44px,12vw,52px);border-radius:50%;background:#fff;color:#6c5ce7;font-size:clamp(26px,7vw,32px);font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 rgba(0,0,0,0.15);flex-shrink:0}
  .poke-group{flex:1;display:flex;flex-wrap:wrap;justify-content:center;gap:clamp(4px,1.2vw,8px);align-items:center}
  .poke-group img{width:clamp(48px,13vw,72px);height:clamp(48px,13vw,72px);object-fit:contain;animation:popIn 0.2s ease}
  @keyframes popIn{0%{transform:scale(0)}100%{transform:scale(1)}}
  .op-sign{font-size:clamp(30px,8vw,38px);color:#fff;font-weight:800;text-shadow:0 3px 0 rgba(0,0,0,0.15);line-height:1}
  .answer-bubble{width:clamp(56px,15vw,64px);height:clamp(56px,15vw,64px);border-radius:50%;background:#fff;color:#a55eea;font-size:clamp(32px,8vw,38px);font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 rgba(0,0,0,0.15);transition:all 0.3s}
  .answer-bubble.win{background:#55efc4;color:#0a6b4f;transform:scale(1.12)}

  /* Short screens (landscape phones, small windows): shrink to fit without scroll */
  @media (max-height:650px){
    .poke-group img{width:clamp(40px,10vw,56px);height:clamp(40px,10vw,56px)}
    .badge{min-width:40px;height:40px;font-size:clamp(22px,5vw,26px)}
    .op-sign{font-size:clamp(24px,6vw,30px)}
    .answer-bubble{width:52px;height:52px;font-size:30px}
    .poke-rows{gap:6px}
  }
  
  .options{display:grid;grid-template-columns:repeat(2,1fr);gap:clamp(10px,2.5vw,14px);padding:8px 16px 16px;flex-shrink:0}
  .opt{padding:clamp(14px,3.5vw,22px);border-radius:20px;border:4px solid transparent;background:#fff;color:#6c5ce7;font-size:clamp(30px,8vw,44px);font-weight:800;text-align:center;cursor:pointer;transition:all 0.15s;box-shadow:0 5px 0 rgba(0,0,0,0.15)}
  .opt:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,0.15)}
  .opt.correct{border-color:#00b894;background:#e0fff3;animation:correctPulse 0.4s ease}
  .opt.wrong{border-color:#d63031;background:#ffe3e3;animation:shake 0.35s ease}
  @keyframes correctPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  
  .feedback{text-align:center;padding:2px 12px;min-height:26px;flex-shrink:0;font-size:clamp(17px,4.5vw,24px);font-weight:800;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,0.15)}
  .feedback.ok{color:#a9ffd9}.feedback.fail{color:#ffe0e0}
  
  .win-overlay{position:absolute;inset:0;z-index:100;background:rgba(15,52,96,0.93);display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:opacity 0.5s;padding:30px;text-align:center}
  .win-overlay.active{opacity:1;pointer-events:all}
  .win-overlay h2{font-size:clamp(28px,8vw,48px);color:#4ecca3}
  .win-overlay button{padding:12px 36px;font-size:clamp(14px,3vw,18px);font-weight:700;background:#4ecca3;color:#1a1a2e;border:none;border-radius:12px;cursor:pointer;margin-top:12px}
  
  .start-overlay{position:absolute;inset:0;z-index:200;background:rgba(15,52,96,0.95);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px;text-align:center;transition:opacity 0.5s}
  .start-overlay.hidden{opacity:0;pointer-events:none}
  .start-overlay h2{font-size:clamp(24px,7vw,40px);color:#f1c40f}
  .start-overlay .start-btn{padding:16px 48px;font-size:clamp(18px,4vw,24px);font-weight:700;background:linear-gradient(135deg,#f1c40f,#f39c12);color:#1a1a2e;border:none;border-radius:16px;cursor:pointer;letter-spacing:2px;margin-top:16px}

  /* Short screens: shrink answer buttons too (must come after base .opt rules) */
  @media (max-height:650px){
    .opt{font-size:clamp(26px,7vw,36px);padding:10px}
    .options{gap:8px;padding:6px 16px 10px}
    .feedback{min-height:20px;font-size:clamp(15px,4vw,20px)}
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
<style>
/* ===== Shared kid menu style ===== */
.start-overlay,.win-overlay,.overlay,.setup-screen{background:linear-gradient(180deg,#6c5ce7 0%,#a55eea 45%,#fd79a8 100%)!important;font-family:'Baloo 2','Comic Sans MS','Chalkboard SE',system-ui,sans-serif!important}
.start-overlay h1,.start-overlay h2,.win-overlay h1,.win-overlay h2,.overlay h2,.setup-screen h1,.setup-screen h2{color:#fff!important;font-weight:800!important;font-family:'Baloo 2','Comic Sans MS','Chalkboard SE',system-ui,sans-serif!important;text-shadow:0 3px 0 rgba(0,0,0,0.18)!important;letter-spacing:1px!important}
.start-overlay p,.win-overlay .sub,.win-overlay .stats,.win-overlay .phrase-read,.overlay .sub,.overlay .final-label,.overlay .final-score,.setup-screen p{color:rgba(255,255,255,0.92)!important;font-weight:600!important;text-shadow:0 2px 0 rgba(0,0,0,0.12)!important}
.start-overlay .logo{animation:menuBob 2.2s ease-in-out infinite}
.start-overlay img,.win-overlay .reward-img,.win-overlay .win-chars img{filter:drop-shadow(0 6px 10px rgba(0,0,0,0.3))}
@keyframes menuBob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
.start-btn,.start-overlay button,.win-overlay button,.overlay button,.setup-screen button{border-radius:999px!important;font-family:'Baloo 2','Comic Sans MS','Chalkboard SE',system-ui,sans-serif!important;font-weight:800!important;font-size:clamp(20px,5vw,28px)!important;padding:16px 46px!important;color:#5b3a00!important;background:linear-gradient(180deg,#ffe259,#ffa751)!important;border:none!important;box-shadow:0 7px 0 #d9820f,0 12px 24px rgba(0,0,0,0.25)!important;letter-spacing:1px!important;cursor:pointer!important;text-transform:none!important}
.start-btn:active,.start-overlay button:active,.win-overlay button:active,.overlay button:active,.setup-screen button:active{transform:translateY(4px)!important;box-shadow:0 2px 0 #d9820f!important}
.start-overlay .back-btn,.win-overlay .back-btn{background:rgba(255,255,255,0.22)!important;color:#fff!important;box-shadow:0 4px 0 rgba(0,0,0,0.2)!important;font-size:clamp(14px,3.5vw,18px)!important;padding:12px 28px!important}
.start-overlay .setting-row span{color:#fff!important;font-weight:700!important;text-shadow:0 2px 0 rgba(0,0,0,0.12)!important}
.start-overlay .size-btn{border-radius:14px!important;border:3px solid rgba(255,255,255,0.4)!important;background:rgba(255,255,255,0.16)!important;color:#fff!important;font-weight:800!important;font-family:inherit!important}
.start-overlay .size-btn.active{border-color:#ffe259!important;background:rgba(255,226,89,0.35)!important;color:#5b3a00!important}
.start-overlay .toggle{border:3px solid rgba(255,255,255,0.4)!important;background:rgba(255,255,255,0.25)!important}
.start-overlay .toggle.active{background:#55efc4!important;border-color:#2fd4a7!important}
</style>
</head>
<body>
<div class="game">
  <div class="header">
    <span>➕ Somar</span>
    <span class="score" id="scoreDisplay">0 ⭐</span>
  </div>
  <div class="arena" id="arena">
    <div class="poke-rows" id="pokeRows"></div>
  </div>
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"></div>
  <div class="win-overlay" id="winOverlay">
    <h2>🏆 Parabéns!</h2>
    <button onclick="restartGame()">Jogar outra vez →</button>
  </div>
  <div class="start-overlay" id="startOverlay">
    <img src="assets/icon.png" style="width:clamp(60px,16vw,120px);height:clamp(60px,16vw,120px);border-radius:16px;margin-bottom:8px">
    <h2>Somar</h2>
    <p>Resolve as somas com a PAW Patrol!</p>
    <button class="start-btn" onclick="startGame()">▶ COMEÇAR</button>
  </div>
</div>
<script>
const PP_CHARS = [
  {name:'Chase',file:'chase.png'},
  {name:'Marshall',file:'marshall.png'},
  {name:'Skye',file:'skye.png'},
  {name:'Rubble',file:'rubble.png'},
  {name:'Rocky',file:'rocky.png'},
  {name:'Zuma',file:'zuma.png'},
];

let score=0,roundNum=0,audioInit=false,audioCtx=null;
let currentA, currentB, currentCharA, currentCharB, ansBubble=null;
const TOTAL_ROUNDS=10;

function initAudio(){if(audioInit)return;audioInit=true;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}catch(e){}}

function speak(text,lang,cb){
  if(!window.speechSynthesis){if(cb)cb();return}
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang=lang||'pt-PT';u.rate=0.85;
  if(cb)u.onend=cb;
  window.speechSynthesis.speak(u);
}

function sfxCorrect(){try{if(!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.setValueAtTime(523,audioCtx.currentTime);o.frequency.linearRampToValueAtTime(784,audioCtx.currentTime+0.15);g.gain.setValueAtTime(0.15,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.2)}catch(e){}}
function sfxWrong(){try{if(!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='square';o.frequency.value=180;g.gain.setValueAtTime(0.12,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.2)}catch(e){}}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a}

function startGame(){
  initAudio();
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('winOverlay').classList.remove('active');
  score=0;roundNum=0;
  document.getElementById('scoreDisplay').textContent='0 ⭐';
  loadRound();
}

function loadRound(){
  if(roundNum>=TOTAL_ROUNDS){document.getElementById('winOverlay').classList.add('active');speak('Parabéns! Completaste as somas!');return}
  roundNum++;
  var a=Math.floor(Math.random()*6),b=Math.floor(Math.random()*6);
  var correct=a+b;
  var charA=PP_CHARS[Math.floor(Math.random()*PP_CHARS.length)];
  var charB=PP_CHARS[Math.floor(Math.random()*PP_CHARS.length)];
  
  currentA=a;currentB=b;currentCharA=charA;currentCharB=charB;
  speak(a + ' ' + charA.name + ' mais ' + b + ' ' + charB.name + '?', 'pt-PT');

  // Visual sum: badge (number once) + character copies per card
  var rows=document.getElementById('pokeRows');
  rows.innerHTML='';
  rows.appendChild(buildPokeCard(charA,a));
  var plus=document.createElement('div');
  plus.className='op-sign';plus.textContent='+';
  rows.appendChild(plus);
  rows.appendChild(buildPokeCard(charB,b));
  var eq=document.createElement('div');
  eq.className='op-sign';eq.textContent='=';
  rows.appendChild(eq);
  ansBubble=document.createElement('div');
  ansBubble.className='answer-bubble';ansBubble.textContent='?';
  rows.appendChild(ansBubble);
  
  // Options
  var opts=[correct];
  while(opts.length<4){var r=Math.floor(Math.random()*11);if(!opts.includes(r)&&r>=0&&r<=10)opts.push(r)}
  opts=shuffle(opts);
  
  const optDiv=document.getElementById('options');
  optDiv.innerHTML='';
  opts.forEach(n=>{
    var div=document.createElement('div');
    div.className='opt';
    div.textContent=n;
    div.dataset.value=n;
    div.addEventListener('click',function(){checkAnswer(parseInt(this.dataset.value),correct);});
    optDiv.appendChild(div);
  });
  
  document.getElementById('feedback').textContent='';
}

function buildPokeCard(char, count){
  var card=document.createElement('div');
  card.className='poke-card';
  var badge=document.createElement('div');
  badge.className='badge';badge.textContent=count;
  card.appendChild(badge);
  var group=document.createElement('div');
  group.className='poke-group';
  for(var i=0;i<count;i++){
    var img=document.createElement('img');
    img.src='assets/'+char.file;
    img.style.animationDelay=(i*0.05)+'s';
    group.appendChild(img);
  }
  card.appendChild(group);
  return card;
}

function checkAnswer(selected,correct){
  const opts=document.querySelectorAll('.opt');
  let chosen=null;
  opts.forEach(o=>{if(parseInt(o.dataset.value)===selected)chosen=o});
  if(!chosen)return;
  
  if(selected===correct){
    sfxCorrect();
    score++;
    document.getElementById('scoreDisplay').textContent=score+' ⭐';
    document.getElementById('feedback').textContent='✅ '+correct+'!';
    document.getElementById('feedback').className='feedback ok';
    chosen.classList.add('correct');
    if(ansBubble){ansBubble.textContent=correct;ansBubble.classList.add('win');}
    speak(correct.toString(), 'pt-PT');
    setTimeout(loadRound,1500);
  }else{
    sfxWrong();
    chosen.classList.add('wrong');
    document.getElementById('feedback').textContent='❌ Tenta outra vez!';
    document.getElementById('feedback').className='feedback fail';
    setTimeout(function(){chosen.classList.remove('wrong')},400);
  }
}

function restartGame(){startGame()}
</script>
</body>
</html>
